version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/hort
    binary: hort
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE*

nfpms:
  - id: hort
    package_name: hort
    vendor: s16e
    homepage: https://github.com/sebastian-breitzke/hort
    maintainer: Sebastian Breitzke <sebastian@s16e.de>
    description: Local secret and config store for humans and AI agents
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: README.md
        dst: /usr/share/doc/hort/README.md
      - src: LICENSE*
        dst: /usr/share/doc/hort/
        file_info:
          mode: 0644

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: sebastian-breitzke
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/sebastian-breitzke/hort"
    description: "Local secret and config store for humans and AI agents"
    license: MIT
    install: |
      bin.install "hort"
    test: |
      assert_match "hort", shell_output("#{bin}/hort --help")

release:
  draft: false
  prerelease: auto
  mode: replace

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
