version: 2

builds:
  - main: ./cmd/hort
    binary: hort
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: s16e
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/s16e/hort"
    description: "Local secret and config store for humans and AI agents"

scoops:
  - repository:
      owner: s16e
      name: scoop-bucket
    homepage: "https://github.com/s16e/hort"
    description: "Local secret and config store for humans and AI agents"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
