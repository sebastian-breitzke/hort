version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: hort
    main: ./cmd/hort
    binary: hort
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

universal_binaries:
  - id: hort-darwin-universal
    ids:
      - hort
    replace: false
    name_template: hort
    hooks:
      post:
        - cmd: bash scripts/build-macos-app.sh "{{ .Path }}" icons/macos/hort.icns "{{ .Version }}" "dist/hort_{{ .Version }}_darwin_universal.zip"

archives:
  - ids:
      - hort
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE*

nfpms:
  - id: hort
    ids:
      - hort
    package_name: hort
    vendor: s16e
    homepage: https://github.com/sebastian-breitzke/hort
    maintainer: Sebastian Breitzke <sebastian@s16e.de>
    description: Local secret and config store for humans and AI agents
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: README.md
        dst: /usr/share/doc/hort/README.md
      - src: LICENSE*
        dst: /usr/share/doc/hort/
        file_info:
          mode: 0644

checksum:
  name_template: "checksums.txt"
  extra_files:
    - glob: ./dist/hort_*_darwin_universal.zip

brews:
  - repository:
      owner: sebastian-breitzke
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/sebastian-breitzke/hort"
    description: "Local secret and config store for humans and AI agents"
    license: MIT
    install: |
      bin.install "hort"
    test: |
      assert_match "hort", shell_output("#{bin}/hort --help")

release:
  draft: false
  prerelease: auto
  mode: replace
  extra_files:
    - glob: ./dist/hort_*_darwin_universal.zip

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
