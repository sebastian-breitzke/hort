version: 2

builds:
  - main: ./cmd/hort
    binary: hort
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: sebastian-breitzke
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/sebastian-breitzke/hort"
    description: "Local secret and config store for humans and AI agents"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
